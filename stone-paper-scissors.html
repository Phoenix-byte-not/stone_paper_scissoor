<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stone Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0c1d;
      --card: #1a1630;
      --card2: #221e3a;
      --accent: #f7c948;
      --accent2: #ff6b6b;
      --green: #4ecca3;
      --text: #f0eeff;
      --muted: #8b85ad;
      --border: rgba(255,255,255,0.07);
      --radius: 20px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(79,45,190,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(247,201,72,0.1) 0%, transparent 50%);
    }

    h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 0.25rem;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(247,201,72,0.3);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    /* Score Board */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .score-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }

    .score-box .name {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .score-box .num {
      font-family: 'Boogaloo', cursive;
      font-size: 2.5rem;
      line-height: 1;
      color: var(--text);
    }

    .score-box.you .num { color: var(--green); }
    .score-box.cpu .num { color: var(--accent2); }

    .vs-label {
      font-family: 'Boogaloo', cursive;
      font-size: 1.4rem;
      color: var(--muted);
      text-align: center;
    }

    /* Arena */
    .arena {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .fighter {
      text-align: center;
    }

    .fighter .emoji {
      font-size: 3.5rem;
      display: block;
      line-height: 1;
      min-height: 56px;
    }

    .fighter .fname {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .fighter .choice-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
      min-height: 1.2em;
    }

    .arena-vs {
      font-family: 'Boogaloo', cursive;
      font-size: 1.2rem;
      color: var(--muted);
    }

    /* Result Banner */
    .result-banner {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      padding: 0.7rem 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: background 0.3s, color 0.3s;
    }

    .result-banner.win  { background: rgba(78,204,163,0.12); border-color: rgba(78,204,163,0.3); color: var(--green); }
    .result-banner.lose { background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.3); color: var(--accent2); }
    .result-banner.draw { background: rgba(247,201,72,0.1); border-color: rgba(247,201,72,0.2); color: var(--accent); }

    /* Choice Buttons */
    .choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1rem;
    }

    .choice-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 0.5rem 0.85rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      user-select: none;
    }

    .choice-btn:hover {
      border-color: var(--accent);
      background: var(--card2);
    }

    .choice-btn:active { transform: scale(0.94); }

    .choice-btn .c-emoji { font-size: 2.2rem; display: block; }
    .choice-btn .c-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Buttons row */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.55rem 1rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }

    .btn-secondary:hover { background: var(--card2); color: var(--text); }

    /* History */
    .history-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .history-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
    }

    .pill {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid transparent;
      letter-spacing: 0.04em;
    }

    .pill.win  { background: rgba(78,204,163,0.12); border-color: rgba(78,204,163,0.25); color: var(--green); }
    .pill.lose { background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.25); color: var(--accent2); }
    .pill.draw { background: rgba(247,201,72,0.08); border-color: rgba(247,201,72,0.2); color: var(--accent); }

    /* Animations */
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35) rotate(-8deg); }
      70%  { transform: scale(0.9) rotate(4deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .pop { animation: pop 0.4s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .shake { animation: shake 0.35s ease; }

    /* Rules section */
    .rules {
      margin-top: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .rules-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .rules-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .rule-chip {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--card2);
      padding: 4px 12px;
      border-radius: 8px;
    }

    .rule-chip span { color: var(--text); }
  </style>
</head>
<body>

<div class="container">
  <h1>✊ SPS Game</h1>
  <p class="subtitle">Stone &nbsp;·&nbsp; Paper &nbsp;·&nbsp; Scissors</p>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-box you">
      <div class="name">You</div>
      <div class="num" id="score-you">0</div>
    </div>
    <div class="vs-label">VS</div>
    <div class="score-box cpu">
      <div class="name">CPU</div>
      <div class="num" id="score-cpu">0</div>
    </div>
  </div>

  <!-- Arena -->
  <div class="arena">
    <div class="fighter">
      <span class="emoji" id="player-emoji">🤔</span>
      <div class="fname">You</div>
      <div class="choice-name" id="player-name">—</div>
    </div>
    <div class="arena-vs">VS</div>
    <div class="fighter">
      <span class="emoji" id="cpu-emoji">🤔</span>
      <div class="fname">Computer</div>
      <div class="choice-name" id="cpu-name">—</div>
    </div>
  </div>

  <!-- Result Banner -->
  <div class="result-banner" id="result-banner">Choose your move to begin! 👇</div>

  <!-- Choice Buttons -->
  <div class="choices">
    <button class="choice-btn" onclick="play('stone')">
      <span class="c-emoji">🪨</span>
      <span class="c-label">Stone</span>
    </button>
    <button class="choice-btn" onclick="play('paper')">
      <span class="c-emoji">📄</span>
      <span class="c-label">Paper</span>
    </button>
    <button class="choice-btn" onclick="play('scissors')">
      <span class="c-emoji">✂️</span>
      <span class="c-label">Scissors</span>
    </button>
  </div>

  <!-- Action Buttons -->
  <div class="btn-row">
    <button class="btn-secondary" onclick="resetScores()">↺ Reset Scores</button>
    <button class="btn-secondary" onclick="resetAll()">✕ Clear All</button>
  </div>

  <!-- History -->
  <div class="history-label">Round History</div>
  <div class="history-pills" id="history-pills">
    <span style="font-size:0.8rem;color:var(--muted)">No rounds played yet.</span>
  </div>

  <!-- Rules -->
  <div class="rules">
    <div class="rules-title">How to Win</div>
    <div class="rules-grid">
      <div class="rule-chip"><span>✊ Stone</span> crushes ✂️ Scissors</div>
      <div class="rule-chip"><span>📄 Paper</span> covers ✊ Stone</div>
      <div class="rule-chip"><span>✂️ Scissors</span> cuts 📄 Paper</div>
    </div>
  </div>
</div>

<script>
  const CHOICES = ['stone', 'paper', 'scissors'];
  const EMOJI = { stone: '🪨', paper: '📄', scissors: '✂️' };
  const BEATS = { stone: 'scissors', paper: 'stone', scissors: 'paper' };
  const LABEL = { stone: 'Stone', paper: 'Paper', scissors: 'Scissors' };

  let scores = { you: 0, cpu: 0 };
  let history = [];

  function play(playerChoice) {
    const cpuChoice = CHOICES[Math.floor(Math.random() * 3)];

    // Update emojis with animation
    const pEl = document.getElementById('player-emoji');
    const cEl = document.getElementById('cpu-emoji');
    pEl.textContent = EMOJI[playerChoice];
    cEl.textContent = EMOJI[cpuChoice];
    document.getElementById('player-name').textContent = LABEL[playerChoice];
    document.getElementById('cpu-name').textContent = LABEL[cpuChoice];

    pEl.classList.remove('pop', 'shake');
    cEl.classList.remove('pop', 'shake');
    void pEl.offsetWidth; // reflow to restart animation

    const banner = document.getElementById('result-banner');
    banner.className = 'result-banner';
    let outcome, msg;

    if (playerChoice === cpuChoice) {
      outcome = 'draw';
      msg = "🤝 It's a draw! Great minds think alike.";
      pEl.classList.add('pop');
      cEl.classList.add('pop');
    } else if (BEATS[playerChoice] === cpuChoice) {
      outcome = 'win';
      msg = `🎉 You win! ${LABEL[playerChoice]} beats ${LABEL[cpuChoice]}!`;
      scores.you++;
      pEl.classList.add('pop');
      cEl.classList.add('shake');
    } else {
      outcome = 'lose';
      msg = `😅 You lose! ${LABEL[cpuChoice]} beats ${LABEL[playerChoice]}.`;
      scores.cpu++;
      cEl.classList.add('pop');
      pEl.classList.add('shake');
    }

    banner.classList.add(outcome);
    banner.textContent = msg;

    document.getElementById('score-you').textContent = scores.you;
    document.getElementById('score-cpu').textContent = scores.cpu;

    history.unshift({ round: history.length + 1, playerChoice, cpuChoice, outcome });
    renderHistory();
  }

  function renderHistory() {
    const el = document.getElementById('history-pills');
    if (!history.length) {
      el.innerHTML = '<span style="font-size:0.8rem;color:var(--muted)">No rounds played yet.</span>';
      return;
    }
    el.innerHTML = history.map(h =>
      `<span class="pill ${h.outcome}" title="Round ${h.round}: You picked ${LABEL[h.playerChoice]}, CPU picked ${LABEL[h.cpuChoice]}">
        R${h.round}: ${EMOJI[h.playerChoice]} vs ${EMOJI[h.cpuChoice]}
      </span>`
    ).join('');
  }

  function resetScores() {
    scores = { you: 0, cpu: 0 };
    document.getElementById('score-you').textContent = 0;
    document.getElementById('score-cpu').textContent = 0;
  }

  function resetAll() {
    resetScores();
    history = [];
    document.getElementById('player-emoji').textContent = '🤔';
    document.getElementById('cpu-emoji').textContent = '🤔';
    document.getElementById('player-name').textContent = '—';
    document.getElementById('cpu-name').textContent = '—';
    const b = document.getElementById('result-banner');
    b.className = 'result-banner';
    b.textContent = 'Choose your move to begin! 👇';
    renderHistory();
  }
</script>
</body>
</html>
